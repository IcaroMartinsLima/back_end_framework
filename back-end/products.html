<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <link rel="stylesheet" href="homeStyle.css">
    <style>
        .content-container {
            padding: 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: #1554CC;
            box-shadow: 0 0 10px rgba(21, 84, 204, 0.3);
        }

        .product-card h3 {
            margin: 0 0 10px;
            color: #1554CC;
        }

        .product-card .category {
            display: inline-block;
            background: #1554CC;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .product-card .description {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 10px;
            min-height: 40px;
        }

        .product-card .price {
            color: #2ecc71;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-card .actions {
            display: flex;
            gap: 8px;
        }

        .product-card button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-rate {
            background: #1554CC;
            color: white;
        }

        .btn-rate:hover {
            background: #0d3aa3;
        }

        .btn-delete {
            background: rgb(172, 14, 14);
            color: white;
        }

        .btn-delete:hover {
            background: rgb(200, 20, 20);
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px; width: 100%; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="images/UniversalScore.png" alt="Logo" style="height: 40px;">
                <h1>Produtos</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span class="user-info-home" id="userGreeting"></span>
                <div class="buttons">
                    <button class="button" onclick="window.location.href='index.html'">Voltar</button>
                    <button class="button" id="addProductBtn">Novo Produto</button>
                    <button class="button logout-button" onclick="logout()">Sair</button>
                </div>
            </div>
        </div>
    </div>

    <div class="content-container">
        <div id="productsContainer" class="products-grid"></div>
    </div>

    <!-- Modal para adicionar produto -->
    <div class="overlay" id="overlay">
        <div class="modal-box" style="width: 400px;">
            <form class="form" id="productForm">
                <h2>Novo Produto</h2>
                <label style="width: 100%;">
                    Nome do Produto:<br>
                    <input type="text" id="productName" placeholder="Ex: iPhone 13" required style="width: 100%; box-sizing: border-box;">
                </label>

                <label style="width: 100%;">
                    Categoria:<br>
                    <select id="productCategory" required style="width: 100%; box-sizing: border-box; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; outline: none; background: #ffffff20; color: #fff;">
                        <option value="">Selecione uma categoria</option>
                        <option value="Celular">Celular</option>
                        <option value="PC">PC</option>
                        <option value="Impressora">Impressora</option>
                        <option value="Outro">Outro</option>
                    </select>
                </label>

                <label style="width: 100%;">
                    Preço (R$):<br>
                    <input type="number" id="productPrice" placeholder="0.00" step="0.01" min="0" required style="width: 100%; box-sizing: border-box;">
                </label>

                <label style="width: 100%;">
                    Descrição:<br>
                    <textarea id="productDescription" placeholder="Descrição do produto" rows="4" required style="width: 100%; box-sizing: border-box;"></textarea>
                </label>

                <div style="display: flex; gap: 10px; width: 100%; margin-top: 15px;">
                    <button type="submit" style="flex: 1;">Salvar</button>
                    <button type="button" id="closeModal" style="flex: 1; background: rgb(172, 14, 14);">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="productScript.js"></script>
</body>

</html>
