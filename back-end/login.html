<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="loginStyle.css">
    <title>Login</title>
</head>

<body>
    <div class="login-box">
        <h2>Entrar</h2>
        <form id="loginForm" style="display:flex; flex-direction:column; align-items:stretch;">
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Senha" required />
            <button type="submit">Login</button>
            <p style="color: white; text-align: center; margin: 15px 0;">
                Não tem conta? <a href="register.html" style="color: #1554CC; cursor: pointer;">Cadastre-se</a>
            </p>
            <h3 style="color: white; text-align: center; font-size: 12px; border-top: 1px solid #333; padding-top: 15px;">
                Demo: meuemail@gmail.com | Senha: 1234
            </h3>
        </form>
    </div>
    <script src="loginScript.js"></script>
</body>

</html>
