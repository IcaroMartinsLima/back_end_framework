<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login - UniversalScore</title>
</head>
<body class="auth-body">
    <div class="login-box">
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <img src="images/UniversalScore.png" alt="Logo" style="height: 30px;">
        </div>
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p>Não tem conta? <a href="register.html" style="color: #1554CC; cursor: pointer;">Cadastre-se aqui</a></p>
    </div>

    <script src="commonScript.js"></script>
    <script src="loginScript.js"></script>
</body>
</html>
<!DOCTYPE html>
