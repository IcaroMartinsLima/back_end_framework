<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações</title>
    <link rel="stylesheet" href="homeStyle.css">
    <style>
        .content-container {
            padding: 20px;
        }

        .ratings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-rating-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            transition: 0.3s;
        }

        .product-rating-card h3 {
            margin: 0 0 10px;
            color: #1554CC;
        }

        .product-rating-card .category {
            display: inline-block;
            background: #1554CC;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .product-rating-card .rating-stats {
            background: #0a0a0a;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 14px;
        }

        .rating-stats-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            color: #aaa;
        }

        .rating-stats-item .value {
            color: #1554CC;
            font-weight: bold;
        }

        .rate-button {
            width: 100%;
            padding: 10px;
            background: #1554CC;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .rate-button:hover {
            background: #0d3aa3;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            grid-column: 1/-1;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px; width: 100%; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="images/UniversalScore.png" alt="Logo" style="height: 40px;">
                <h1>Avaliações</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span class="user-info-home" id="userGreeting"></span>
                <div class="buttons">
                    <button class="button" onclick="window.location.href='index.html'">Voltar</button>
                    <button class="button logout-button" onclick="logout()">Sair</button>
                </div>
            </div>
        </div>
    </div>

    <div class="content-container">
        <div id="ratingsContainer" class="ratings-grid"></div>
    </div>

    <!-- Modal para adicionar avaliação -->
    <div class="overlay" id="overlay">
        <div class="modal-box" style="width: 400px;">
            <form class="form" id="ratingForm">
                <h2>Avaliar Produto</h2>
                <p id="productNameDisplay" style="color: #aaa; margin: 10px 0; text-align: center;"></p>

                <label style="width: 100%;">
                    Nota:<br>
                    <div class="rating" style="justify-content: center;">
                        <input value="5" class="rate" name="rate" id="star5" type="radio">
                        <label title="text" for="star5"></label>

                        <input value="4" class="rate" name="rate" id="star4" type="radio">
                        <label title="text" for="star4"></label>

                        <input value="3" class="rate" name="rate" id="star3" type="radio" checked>
                        <label title="text" for="star3"></label>

                        <input value="2" class="rate" name="rate" id="star2" type="radio">
                        <label title="text" for="star2"></label>

                        <input value="1" class="rate" name="rate" id="star1" type="radio">
                        <label title="text" for="star1"></label>
                    </div>
                </label>

                <label style="width: 100%;">
                    Comentário:<br>
                    <textarea id="comentario" placeholder="Compartilhe sua experiência com este produto" rows="4" required style="width: 100%; box-sizing: border-box;"></textarea>
                </label>

                <div style="display: flex; gap: 10px; width: 100%; margin-top: 15px;">
                    <button type="submit" style="flex: 1;">Salvar Avaliação</button>
                    <button type="button" id="closeModal" style="flex: 1; background: rgb(172, 14, 14);">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="ratingScript.js"></script>
</body>

</html>
