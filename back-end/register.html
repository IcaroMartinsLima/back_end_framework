<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="loginStyle.css">
    <title>Cadastro</title>
</head>

<body>
    <div class="login-box">
        <h2>Criar Conta</h2>
        <form id="registerForm" style="display:flex; flex-direction:column; align-items:stretch;">
            <input type="text" id="name" placeholder="Nome completo" required />
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Senha" required />
            <input type="password" id="confirmPassword" placeholder="Confirmar Senha" required />
            <button type="submit">Cadastrar</button>
            <p style="color: white; text-align: center; margin-top: 15px;">
                Já tem conta? <a href="login.html" style="color: #1554CC; cursor: pointer;">Faça login</a>
            </p>
        </form>
    </div>
    <script src="registerScript.js"></script>
</body>

</html>
