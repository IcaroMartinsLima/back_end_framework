<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores</title>
    <link rel="stylesheet" href="homeStyle.css">
    <style>
        .content-container {
            padding: 20px;
        }

        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .indicator-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .indicator-card h3 {
            color: #aaa;
            margin: 0 0 10px;
            font-size: 14px;
        }

        .indicator-card .value {
            color: #1554CC;
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }

        .indicator-card .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .ratings-table {
            width: 100%;
            border-collapse: collapse;
            background: #1e1e1e;
            margin-top: 20px;
        }

        .ratings-table th,
        .ratings-table td {
            border: 1px solid #333;
            padding: 12px;
            text-align: left;
        }

        .ratings-table th {
            background: #272727;
        }

        .ratings-table tr:hover {
            background: #252525;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px; width: 100%; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="images/UniversalScore.png" alt="Logo" style="height: 40px;">
                <h1>Indicadores</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span class="user-info-home" id="userGreeting"></span>
                <div class="buttons">
                    <button class="button" onclick="window.location.href='index.html'">Voltar</button>
                    <button class="button logout-button" onclick="logout()">Sair</button>
                </div>
            </div>
        </div>
    </div>

    <div class="content-container">
        <h2 style="color: white; margin-bottom: 20px;">Estatísticas Gerais</h2>
        
        <div class="indicators-grid">
            <div class="indicator-card">
                <div class="icon">📦</div>
                <h3>Total de Produtos</h3>
                <div class="value" id="totalProducts">0</div>
            </div>

            <div class="indicator-card">
                <div class="icon">⭐</div>
                <h3>Total de Avaliações</h3>
                <div class="value" id="totalRatings">0</div>
            </div>

            <div class="indicator-card">
                <div class="icon">📊</div>
                <h3>Avaliação Média</h3>
                <div class="value" id="avgRating">0</div>
            </div>

            <div class="indicator-card">
                <div class="icon">💰</div>
                <h3>Maior Preço</h3>
                <div class="value" id="maxPrice">-</div>
            </div>

            <div class="indicator-card">
                <div class="icon">🏷️</div>
                <h3>Menor Preço</h3>
                <div class="value" id="minPrice">-</div>
            </div>

            <div class="indicator-card">
                <div class="icon">👥</div>
                <h3>Produtos Mais Avaliados</h3>
                <div class="value" id="mostRated">0</div>
            </div>
        </div>

        <h2 style="color: white; margin-top: 40px; margin-bottom: 20px;">Avaliações Recentes</h2>
        <table class="ratings-table">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Avaliador</th>
                    <th>Nota</th>
                    <th>Comentário</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody id="ratingsBody">
            </tbody>
        </table>
    </div>

    <script src="indicatorsScript.js"></script>
</body>

</html>
