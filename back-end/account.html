<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conta</title>
    <link rel="stylesheet" href="homeStyle.css">
    <style>
        .content-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .account-section {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .account-section h2 {
            color: #1554CC;
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .account-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        .info-item label {
            color: #aaa;
            font-size: 14px;
        }

        .info-item .value {
            color: white;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-primary {
            flex: 1;
            padding: 12px;
            background: #1554CC;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #0d3aa3;
        }

        .btn-danger {
            flex: 1;
            padding: 12px;
            background: rgb(172, 14, 14);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-danger:hover {
            background: rgb(200, 20, 20);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-item .label {
            color: #aaa;
            font-size: 12px;
        }

        .stat-item .value {
            color: #1554CC;
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
        }

        .modal-content h3 {
            color: white;
            margin-top: 0;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
            background: #ffffff20;
            color: white;
            box-sizing: border-box;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px; width: 100%; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="images/UniversalScore.png" alt="Logo" style="height: 40px;">
                <h1>Minha Conta</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="buttons">
                    <button class="button" onclick="window.location.href='index.html'">Voltar</button>
                    <button class="button logout-button" onclick="logout()">Sair</button>
                </div>
            </div>
        </div>
    </div>

    <div class="content-container">
        <!-- Informações da Conta -->
        <div class="account-section">
            <h2>Informações da Conta</h2>
            <div class="account-info">
                <div class="info-item">
                    <label>Nome</label>
                    <div class="value" id="userName">-</div>
                </div>
                <div class="info-item">
                    <label>Email</label>
                    <div class="value" id="userEmail">-</div>
                </div>
                <div class="info-item">
                    <label>Data de Cadastro</label>
                    <div class="value" id="createdAt">-</div>
                </div>
            </div>
            <div class="button-group">
                <button class="btn-primary" onclick="openChangePasswordModal()">Alterar Senha</button>
            </div>
        </div>

        <!-- Estatísticas do Usuário -->
        <div class="account-section">
            <h2>Suas Estatísticas</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="label">Avaliações Deixadas</div>
                    <div class="value" id="userRatings">0</div>
                </div>
                <div class="stat-item">
                    <div class="label">Produtos Criados</div>
                    <div class="value" id="userProducts">0</div>
                </div>
            </div>
        </div>

        <!-- Segurança -->
        <div class="account-section">
            <h2>Segurança</h2>
            <p style="color: #aaa; font-size: 14px; margin: 0 0 15px;">Gerencie as configurações de segurança da sua conta</p>
            <div class="button-group">
                <button class="btn-danger" onclick="deleteAccount()">Deletar Conta</button>
            </div>
        </div>
    </div>

    <!-- Modal para alterar senha -->
    <div class="modal-overlay" id="changePasswordModal">
        <div class="modal-content">
            <h3>Alterar Senha</h3>
            <input type="password" class="modal-input" id="currentPassword" placeholder="Senha atual" />
            <input type="password" class="modal-input" id="newPassword" placeholder="Nova senha" />
            <input type="password" class="modal-input" id="confirmPassword" placeholder="Confirmar nova senha" />
            <div class="modal-buttons">
                <button style="background: #1554CC; color: white;" onclick="changePassword()">Salvar</button>
                <button style="background: #333; color: white;" onclick="closeChangePasswordModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="accountScript.js"></script>
</body>

</html>
